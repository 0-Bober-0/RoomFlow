name: Deploy to Railway

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: railway-production
  cancel-in-progress: false

jobs:
  ci:
    name: Validate before deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Build backend
        working-directory: room-booking-backend
        run: gradle clean bootJar --no-daemon

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: room-booking-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: room-booking-frontend
        run: npm install

      - name: Build frontend
        working-directory: room-booking-frontend
        run: npm run build

  deploy-backend:
    name: Deploy backend service
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_BACKEND_SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          railway up ./room-booking-backend --path-as-root --service "$RAILWAY_BACKEND_SERVICE" --environment "${RAILWAY_ENVIRONMENT:-production}" --ci

  deploy-frontend:
    name: Deploy frontend service
    needs: [ci, deploy-backend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_FRONTEND_SERVICE: ${{ secrets.RAILWAY_FRONTEND_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          railway up ./room-booking-frontend --path-as-root --service "$RAILWAY_FRONTEND_SERVICE" --environment "${RAILWAY_ENVIRONMENT:-production}" --ci
