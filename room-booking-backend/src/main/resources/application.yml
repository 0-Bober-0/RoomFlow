server:
  port: ${PORT:${SERVER_PORT:8080}}
  shutdown: graceful

spring:
  application:
    name: room-booking-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/coworking_booking}
    username: ${SPRING_DATASOURCE_USERNAME:booking}
    password: ${SPRING_DATASOURCE_PASSWORD:booking}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      username: ${SPRING_DATA_REDIS_USERNAME:}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2s

  cache:
    type: redis

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-please-local-dev-secret-256-bit}
    expiration: ${JWT_EXPIRATION:PT24H}
    issuer: coworking-booking-api
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    limit: ${RATE_LIMIT_LIMIT:120}
    window: ${RATE_LIMIT_WINDOW:PT1M}
  seed:
    enabled: ${SEED_ENABLED:true}
    admin-email: ${ADMIN_EMAIL:admin@coworking.local}
    admin-password: ${ADMIN_PASSWORD:Admin12345!}
